<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Inventory{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <a class="brand" href="/">Inventory</a>
        <nav class="nav">
          <a href="{{ url_for('suppliers.suppliers_list') }}">Suppliers</a>
          <a href="{{ url_for('products.products_list') }}">Products</a>
          <a href="{{ url_for('customers.customers_list') }}">Customers</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="messages">
            {% for category, message in messages %}
              <div class="message {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <div class="container">Flask + MySQL</div>
    </footer>
  </body>
</html>
