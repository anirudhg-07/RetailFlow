{% extends 'base.html' %}

{% block title %}New Order{% endblock %}

{% block content %}
  <section class="card">
    <h1>New Order</h1>
    <p class="small">Add items and review totals before submitting.</p>

    <form method="post" action="{{ url_for('orders.orders_create') }}" id="order-form">
      <div class="grid grid-2">
        <div>
          <label>Customer</label>
          <select name="customer_id" required>
            <option value="">— Select customer —</option>
            {% for c in customers %}
              <option value="{{ c.customer_id }}">{{ c.customer_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label>Order date</label>
          <input type="date" value="{{ today }}" disabled />
        </div>
      </div>

      <div class="card" style="margin: 16px 0;">
        <div class="actions" style="justify-content: space-between;">
          <strong>Items</strong>
          <button class="button secondary" type="button" id="add-item">+ Add item</button>
        </div>

        <table class="table" id="items-table">
          <thead>
            <tr>
              <th style="width: 45%;">Product</th>
              <th style="width: 15%;">Qty</th>
              <th style="width: 20%;">Price</th>
              <th style="width: 20%;">Line total</th>
              <th style="width: 80px;"></th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
          <tfoot>
            <tr>
              <td colspan="3" style="text-align:right;"><strong>Total</strong></td>
              <td><strong id="grand-total">0.00</strong></td>
              <td></td>
            </tr>
          </tfoot>
        </table>

        <p class="small">Note: Saving the order to DB will be enabled in Phase 2 transaction logic.</p>
      </div>

      <div class="actions">
        <button class="button" type="submit">Submit Order</button>
      </div>
    </form>
  </section>

  <template id="item-row-template">
    <tr class="item-row">
      <td>
        <select name="product_id" class="product-select" required>
          <option value="">— Select product —</option>
          {% for p in products %}
            <option value="{{ p.product_id }}" data-price="{{ p.price }}" data-stock="{{ p.quantity }}">
              {{ p.product_name }} (Stock: {{ p.quantity }})
            </option>
          {% endfor %}
        </select>
      </td>
      <td>
        <input name="quantity" class="qty" type="number" step="1" min="1" value="1" required />
      </td>
      <td>
        <input name="price" class="price" type="number" step="0.01" min="0" value="0" required />
      </td>
      <td>
        <span class="line-total">0.00</span>
      </td>
      <td>
        <button class="button danger remove-item" type="button">Remove</button>
      </td>
    </tr>
  </template>

  <script>
    (function () {
      const addBtn = document.getElementById('add-item');
      const body = document.getElementById('items-body');
      const tpl = document.getElementById('item-row-template');
      const grandTotalEl = document.getElementById('grand-total');

      function money(n) {
        const x = Number.isFinite(n) ? n : 0;
        return x.toFixed(2);
      }

      function recompute() {
        let grand = 0;
        body.querySelectorAll('tr.item-row').forEach((row) => {
          const qty = parseInt(row.querySelector('input.qty').value || '0', 10);
          const price = parseFloat(row.querySelector('input.price').value || '0');
          const line = Math.max(0, qty) * Math.max(0, price);
          row.querySelector('.line-total').textContent = money(line);
          grand += line;
        });
        grandTotalEl.textContent = money(grand);
      }

      function onProductChange(row) {
        const select = row.querySelector('select.product-select');
        const opt = select.selectedOptions[0];
        if (!opt) return;
        const price = parseFloat(opt.getAttribute('data-price') || '0');
        row.querySelector('input.price').value = money(price);
        recompute();
      }

      function addRow() {
        const fragment = tpl.content.cloneNode(true);
        const row = fragment.querySelector('tr.item-row');

        row.querySelector('.remove-item').addEventListener('click', () => {
          row.remove();
          recompute();
        });

        row.querySelector('input.qty').addEventListener('input', recompute);
        row.querySelector('input.price').addEventListener('input', recompute);
        row.querySelector('select.product-select').addEventListener('change', () => onProductChange(row));

        body.appendChild(fragment);
        recompute();
      }

      addBtn.addEventListener('click', addRow);
      addRow(); // start with one row
    })();
  </script>
{% endblock %}
